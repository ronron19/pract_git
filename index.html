<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      width: 90%;
      max-width: 1200px;
      background: #f3f3f3;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      position: relative;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      color: #444;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #666;
      font-size: 14px;
    }

    .btn {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      display: flex;
      align-items: center;
      margin-top: 60px;
      gap: 40px;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 55px;
      color: #3b2f4a;
      line-height: 1.1;
    }

    .hero-text p {
      margin: 20px 0;
      color: #777;
      max-width: 400px;
    }

    .hero-image {
      flex: 1;
      text-align: center;
    }

  .hero-image img {
  width: 100%;
  max-width: 420px;
  border-radius: 25px;

  /* REMOVE HARSH LOOK */
  background: transparent;

  /* BLENDING INTO THEME */
  padding: 10px;
  background: linear-gradient(135deg, rgba(106,17,203,0.15), rgba(37,117,252,0.15));
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);

  /* SOFT MODERN EFFECT */
  backdrop-filter: blur(5px);
  border: 2px solid rgba(255,255,255,0.25);

  /* IMAGE FEEL */
  object-fit: cover;
}

.hero-image img:hover {
  transform: scale(1.03);
  transition: 0.3s ease;
  box-shadow: 0 30px 60px rgba(0,0,0,0.25);
}

    .shape1, .shape2 {
      position: absolute;
      border-radius: 50%;
      z-index: -1;
    }

    .shape1 {
      width: 200px;
      height: 200px;
      background: #ff6b6b;
      top: -80px;
      left: -80px;
    }

    .shape2 {
      width: 250px;
      height: 250px;
      background: #5f27cd;
      bottom: -100px;
      right: -100px;
    }

    @media(max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 40px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="shape1"></div>
    <div class="shape2"></div>

    <!-- NAVBAR -->
    <div class="nav">
      <div class="logo">MY WEBSITE</div>

      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Info</a>
        <a href="#">Skills</a>
        <a href="#" class="btn" style="color: white;">Projects</a>
      </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero">
      <div class="hero-text">
        <h1>Latorre<br>Ahron</h1>
        <p>
          Aspiring IT professional seeking an opportunity to apply my knowledge
          and develop my skills in a dynamic work environment, eager to contribute to
          success while continuously learning and growing.
        </p>
        <a href="#" class="btn">Projects</a>
      </div>

      <div class="hero-image">
        <img src="src/images/gradpic.jpg" alt="Profile Picture">
      </div>
    </div>

  </div>

</body>
</html>
