<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      width: 90%;
      max-width: 1200px;
      background: #f3f3f3;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      position: relative;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      color: #444;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #666;
      font-size: 14px;
    }

    .btn {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      display: flex;
      align-items: center;
      margin-top: 60px;
      gap: 40px;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 55px;
      color: #3b2f4a;
      line-height: 1.1;
    }

    .hero-text p {
      margin: 20px 0;
      color: #777;
      max-width: 400px;
    }

    .hero-image {
      flex: 1;
      text-align: center;
    }

    .hero-image img {
      width: 100%;
      max-width: 450px;
    }

    /* BACKGROUND SHAPES */
    .shape1, .shape2 {
      position: absolute;
      border-radius: 50%;
      z-index: -1;
    }

    .shape1 {
      width: 200px;
      height: 200px;
      background: #ff6b6b;
      top: -80px;
      left: -80px;
    }

    .shape2 {
      width: 250px;
      height: 250px;
      background: #5f27cd;
      bottom: -100px;
      right: -100px;
    }

    @media(max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 40px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="shape1"></div>
    <div class="shape2"></div>

    <!-- NAVBAR -->
    <div class="nav">
      <div class="logo">YOUR WEBSITE</div>

      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About us</a>
        <a href="#">Work</a>
        <a href="#">Info</a>
        <a href="#" class="btn">Get Started</a>
      </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero">
      <div class="hero-text">
        <h1>Website<br>Design</h1>
        <p>
          Lorem ipsum dolor sit amet, consectetur adipiscing elit.
          Sed eget libero feugiat, faucibus libero id, scelerisque quam.
        </p>
        <a href="#" class="btn">Button name</a>
      </div>

      <div class="hero-image">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" alt="Design Illustration">
      </div>
    </div>

  </div>

</body>
</html>
