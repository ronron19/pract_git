<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      width: 90%;
      max-width: 1200px;
      background: #f3f3f3;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      color: #444;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #666;
      font-size: 14px;
    }

    .btn {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      display: flex;
      align-items: center;
      margin-top: 60px;
      gap: 40px;
      position: relative;
      z-index: 2;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 55px;
      color: #3b2f4a;
      line-height: 1.1;
    }

    .hero-text p {
      margin: 20px 0;
      color: #777;
      max-width: 400px;
    }

    /* PROFILE IMAGE (CIRCLE) */
    .hero-image {
      flex: 1;
      text-align: center;
    }

    .hero-image img {
      width: 320px;
      height: 320px;
      object-fit: cover;
      border-radius: 50%;

      border: 6px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      background: #fff;
      padding: 8px;

      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* BUTTON */
    .btn {
      display: inline-block;
    }

    /* ORIGINAL SHAPES */
    .shape1, .shape2 {
      position: absolute;
      border-radius: 50%;
      z-index: 0;
      opacity: 0.4;
    }

    .shape1 {
      width: 200px;
      height: 200px;
      background: #ff6b6b;
      top: -80px;
      left: -80px;
    }

    .shape2 {
      width: 250px;
      height: 250px;
      background: #5f27cd;
      bottom: -100px;
      right: -100px;
    }

    /* NEW BACKGROUND CIRCLES */
    .circle-bg {
      position: absolute;
      border-radius: 50%;
      z-index: 0;
      opacity: 0.12;
      filter: blur(1px);
    }

    .c1 {
      width: 300px;
      height: 300px;
      background: #6a11cb;
      top: 120px;
      left: 60px;
    }

    .c2 {
      width: 220px;
      height: 220px;
      background: #2575fc;
      bottom: 80px;
      left: 45%;
    }

    .c3 {
      width: 160px;
      height: 160px;
      background: #ff6b6b;
      top: 180px;
      right: 100px;
    }

    /* RESPONSIVE */
    @media(max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 40px;
      }

      .hero-image img {
        width: 250px;
        height: 250px;
      }
    }

  </style>
</head>

<body>

  <div class="wrapper">

    <!-- BACKGROUND SHAPES -->
    <div class="shape1"></div>
    <div class="shape2"></div>

    <div class="circle-bg c1"></div>
    <div class="circle-bg c2"></div>
    <div class="circle-bg c3"></div>

    <!-- NAV -->
    <div class="nav">
      <div class="logo">MY WEBSITE</div>

      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Info</a>
        <a href="#">Skills</a>
        <a href="#" class="btn">Projects</a>
      </div>
    </div>

    <!-- HERO -->
    <div class="hero">
      <div class="hero-text">
        <h1>Latorre<br>Ahron</h1>
        <p>
          Aspiring IT professional seeking an opportunity to apply my knowledge
          and develop my skills in a dynamic work environment, eager to contribute to
          success while continuously learning and growing.
        </p>
        <a href="#" class="btn">Projects</a>
      </div>

      <div class="hero-image">
        <img src="src/images/gradpic.jpg" alt="Profile Picture">
      </div>
    </div>

  </div>

</body>
</html>
